version: "3.8"

services:

  app-blue:
    build: .
    container_name: app-blue
    ports:
      - "3001:80"
    restart: always

  app-green:
    build: .
    container_name: app-green
    ports:
      - "3002:80"
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3003:3000"
