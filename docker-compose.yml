version: '3.8'

services:
  app:
    build: .
    container_name: portfolio_app
    ports:
      - "80:80"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"